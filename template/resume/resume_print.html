<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Jatin Patware — Senior Data Engineer</title>
<style>
  body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 820px; margin: 0 auto; padding: 30px 40px; line-height: 1.5; }
  h1 { font-size: 26pt; color: #1a2942; margin: 0 0 4px 0; }
  .subtitle { font-size: 12pt; color: #444; margin-bottom: 6px; }
  .contact { font-size: 9.5pt; color: #555; margin-bottom: 18px; }
  .contact a { color: #0077b5; text-decoration: none; }
  hr { border: none; border-top: 2px solid #1a2942; margin: 14px 0 10px 0; }
  h2 { font-size: 11pt; font-weight: 700; color: #1a2942; text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 2px 0; }
  h3 { font-size: 11pt; font-weight: 700; margin: 12px 0 1px 0; color: #1a1a1a; }
  .company { color: #1a2942; font-weight: 600; }
  .role-header { display: flex; justify-content: space-between; align-items: baseline; }
  .date { font-size: 9.5pt; color: #666; white-space: nowrap; }
  .stack { font-size: 9pt; color: #555; font-style: italic; margin: 3px 0 6px 0; background: #f5f7fa; padding: 3px 8px; border-left: 3px solid #1a2942; }
  ul { margin: 4px 0 8px 0; padding-left: 18px; }
  li { margin-bottom: 3px; font-size: 10.5pt; }
  table { width: 100%; border-collapse: collapse; font-size: 10pt; margin-top: 6px; }
  td { padding: 3px 8px; vertical-align: top; }
  td:first-child { font-weight: 600; color: #1a2942; width: 130px; white-space: nowrap; }
  .cert-list { columns: 2; font-size: 10.5pt; }
  .cert-list li { margin-bottom: 4px; }
  @media print {
    body { padding: 20px 30px; }
    a { color: #0077b5 !important; }
  }
</style>
</head>
<body>

<script src="../data.js"></script>
<script>
const d = resumeData;

// Header
document.write(`
  <h1>${d.name}</h1>
  <div class="subtitle">${d.title}</div>
  <div class="contact">
    ${d.location} &nbsp;|&nbsp;
    <a href="mailto:${d.email}">${d.email}</a> &nbsp;|&nbsp;
    <a href="${d.linkedin}">LinkedIn</a> &nbsp;|&nbsp;
    <a href="${d.github}">GitHub</a> &nbsp;|&nbsp;
    <a href="${d.portfolio}">Portfolio</a>
  </div>
`);

// Summary
document.write(`<h2>Summary</h2><hr/><p>${d.summary.replace(/\n\s+/g, ' ').trim()}</p>`);

// Technical Skills
document.write(`<h2>Technical Skills</h2><hr/><table>`);
d.skills.forEach(sg => {
  document.write(`<tr><td>${sg.category}</td><td>${sg.items.join(' · ')}</td></tr>`);
});
document.write(`</table>`);

// Experience
document.write(`<h2>Work Experience</h2><hr/>`);
d.experience.forEach((exp, ei) => {
  // Company header only once
  const companyLabel = exp.companyDesc ? `${exp.company} — ${exp.companyDesc}` : exp.company;
  document.write(`<div class="role-header"><h3><span class="company">${companyLabel}</span></h3></div>`);

  exp.roles.forEach(role => {
    document.write(`
      <div class="role-header"><h3>${role.title}</h3><span class="date">${role.period}</span></div>
      <div class="stack">Stack: ${role.stack}</div>
      <ul>
        ${role.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    `);
  });
});

// Certifications
document.write(`<h2>Certifications</h2><hr/><ul class="cert-list">`);
d.certifications.forEach(c => {
  if (c.featured) {
    document.write(`<li><strong>${c.name}</strong></li>`);
  } else {
    document.write(`<li>${c.name}</li>`);
  }
});
document.write(`</ul>`);

// Education
document.write(`<h2>Education</h2><hr/>`);
d.education.forEach(e => {
  document.write(`
    <div class="role-header"><strong>${e.degree}</strong><span class="date">${e.period}</span></div>
    <div>${e.school} · CGPA ${e.cgpa}</div>
  `);
  if (e.notes && e.notes.length) {
    document.write(`<ul>${e.notes.map(n => `<li>${n}</li>`).join('')}</ul>`);
  }
});

// Achievements
document.write(`<h2>Achievements</h2><hr/><ul>`);
d.achievements.forEach(a => {
  document.write(`<li>${a}</li>`);
});
document.write(`</ul>`);
</script>

</body>
</html>
